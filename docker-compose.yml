services:
  mysql:
    image: mysql:8.0
    container_name: monthly-journal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: monthly_bill
      MYSQL_USER: copilot
      MYSQL_PASSWORD: copilot123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monthly-journal-net

  monthly-journal-api:
    build: .
    container_name: monthly-journal-api
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DB_HOST: mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - monthly-journal-net

volumes:
  mysql_data:

networks:
  monthly-journal-net:
    driver: bridge
